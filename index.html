<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Triangle Info</title>

    <link rel="stylesheet" href="style.css" />

    <script defer src="main.js"></script>
  </head>

  <body>
    <h1>Triangle Info</h1>
    <hr />

    <p>
      <img
        src="triangle-vertices.PNG"
        alt="Triangle Image"
        width="400" />
    </p>
    <hr />
    <p>
      Enter the vertices of triangle and click "Calculate" to determine the side
      lengths and perimeter of the triangle
    </p>
    <p>
      <strong>Vertex A</strong> - xA:<input id="xA" type="number" /> yA:<input
        id="yA"
        type="number" />
    </p>
    <p>
      <strong>Vertex B</strong> - xB:<input id="xB" type="number" /> yB:<input
        id="yB"
        type="number" />
    </p>
    <p>
      <strong>Vertex C</strong> - xC:<input id="xC" type="number" /> yC:<input
        id="yC"
        type="number" />
    </p>
    <hr />
    <button id="calculate">Calculate</button>
    <strong
      ><p>AB = <span id="outputAB"></span></p
    ></strong>
    <strong
      ><p>AC = <span id="outputAC"></span></p
    ></strong>
    <strong
      ><p>BC = <span id="outputBC"></span></p
    ></strong>
    <strong
      ><p>Perimeter of ABC = <span id="outputP"></span></p
    ></strong>
  </body>
</html>
